name: Sync speciesLink

on:
  workflow_dispatch:
    inputs:
      bem_id:
        description: "BEM species ID(s) separados por vírgula, ex: 1 ou 1,2,3 (deixe vazio para sincronizar todas)"
        required: false
        type: string

  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: read

concurrency:
  group: sync-specieslink
  cancel-in-progress: true

jobs:
  sync:
    runs-on: self-hosted
    container:
      image: python:3.12-slim
      options: --network bem-ci
    timeout-minutes: 60
    env:
      DOTENV_KEY: ${{ secrets.DOTENV_KEY }}
      APP_ENV: production
      PYTHONUNBUFFERED: "1"
      UV_LINK_MODE: copy
      BEM_ID: ${{ inputs.bem_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install -q --user uv
          ~/.local/bin/uv sync --frozen --no-dev

      - name: Run sync script
        run: ~/.local/bin/uv run python scripts/sync_specieslink.py
