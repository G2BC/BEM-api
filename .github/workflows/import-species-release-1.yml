name: Import Species (Release 1)

on:
  workflow_dispatch:
    inputs:
      sheet_id:
        description: "ID do Google Sheets (parte da URL: /spreadsheets/d/{ID}/)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  import:
    runs-on: self-hosted
    container:
      image: python:3.12-slim
      options: --network bem-ci
    timeout-minutes: 30
    env:
      DOTENV_KEY: ${{ secrets.DOTENV_KEY }}
      APP_ENV: production
      PYTHONUNBUFFERED: "1"
      UV_LINK_MODE: copy
      EXCEL_PATH: /tmp/species.xlsx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Google Sheets as XLSX
        run: |
          curl -fL \
            "https://docs.google.com/spreadsheets/d/${{ inputs.sheet_id }}/export?format=xlsx" \
            -o /tmp/species.xlsx

      - name: Install dependencies
        run: |
          pip install -q --user uv
          ~/.local/bin/uv sync --frozen --no-dev

      - name: Run import script
        run: ~/.local/bin/uv run python scripts/old/import_species_release_1.py
