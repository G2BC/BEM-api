name: Import iNaturalist Photos

on:
  workflow_dispatch:
    inputs:
      bem_id:
        description: "BEM species ID(s) separados por vírgula, ex: 1 ou 1,2,3 (deixe vazio para sincronizar todas)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: import-inaturalist-photos
  cancel-in-progress: true

jobs:
  import:
    runs-on: self-hosted
    container:
      image: python:3.12-slim
      options: --network bem-ci
    timeout-minutes: 240
    env:
      DOTENV_KEY: ${{ secrets.DOTENV_KEY }}
      APP_ENV: production
      PYTHONUNBUFFERED: "1"
      UV_LINK_MODE: copy
      BEM_ID: ${{ inputs.bem_id }}
      INAT_PHOTOS_MAX_RUNTIME_SECONDS: "14100"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install -q --user uv
          ~/.local/bin/uv sync --frozen --no-dev

      - name: Run import script
        run: ~/.local/bin/uv run python scripts/sync_inaturalist_photos.py
