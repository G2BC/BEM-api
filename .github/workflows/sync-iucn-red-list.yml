name: Sync IUCN Red List

on:
  workflow_dispatch:
    inputs:
      bem_id:
        description: "BEM species ID(s) separados por vírgula, ex: 1 ou 1,2,3 (deixe vazio para sincronizar todas)"
        required: false
        type: string
      bem:
        description: "Código(s) BEM separados por vírgula, ex: BEM1 ou BEM1,BEM2 (deixe vazio para sincronizar todas)"
        required: false
        type: string
      cf_clearance:
        description: "Cookie cf_clearance obtido do browser após acessar api.iucnredlist.org"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: sync-iucn-red-list
  cancel-in-progress: true

jobs:
  sync:
    runs-on: self-hosted
    container:
      image: python:3.12-slim
      options: --network bem-ci
    timeout-minutes: 30
    env:
      DOTENV_KEY: ${{ secrets.DOTENV_KEY }}
      APP_ENV: production
      PYTHONUNBUFFERED: "1"
      UV_LINK_MODE: copy
      BEM_ID: ${{ inputs.bem_id }}
      BEM: ${{ inputs.bem }}
      IUCN_CF_CLEARANCE: ${{ inputs.cf_clearance }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python version
        run: python --version

      - name: Install dependencies
        run: |
          pip install -q --user uv
          ~/.local/bin/uv sync --frozen --no-dev

      - name: Run sync script
        run: ~/.local/bin/uv run python scripts/sync_iucn_red_list.py
